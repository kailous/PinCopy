<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PinCopy</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <div class="app">

    <!-- 顶部标题栏 -->
    <header class="header">
      <div class="header-left">
        <div class="logo"></div>
        <h1 class="title">PinCopy</h1>
        <span class="badge" id="count-badge">0</span>
      </div>
      <div class="header-right">
        <button class="icon-btn" id="copy-all-btn" title="全部复制"></button>
        <button class="icon-btn" id="push-btn" title="推送到画板"></button>
        <button class="icon-btn" id="sort-btn" title="切换排序"></button>
        <button class="icon-btn danger" id="clear-btn" title="清空全部"></button>
      </div>
    </header>



    <!-- 内容区 -->
    <div class="content-wrap">
      <!-- 瀑布流画廊 -->
      <div class="gallery" id="gallery"></div>

      <!-- 空状态 -->
      <div class="empty-state" id="empty-state">
        <div class="icon-wrap"></div>
        <h2>收藏夹是空的</h2>
        <p>在 Pinterest 浏览时<br>点击图片上的书签按钮收藏</p>
      </div>

      <!-- 无搜索结果 -->
      <div class="no-results" id="no-results">
        <div class="icon-wrap"></div>
        <p>没有找到匹配的图片</p>
      </div>
    </div>

  </div>

  <!-- 推送到画板对话框 -->
  <div class="modal-overlay" id="push-modal-overlay">
    <div class="modal">

      <!-- 第一步：输入画板名 -->
      <div id="push-step-input">
        <h3>推送到画板</h3>
        <p>将 <span id="push-modal-count">0</span> 张图片重新保存到指定的 Pinterest 画板。</p>
        <input class="board-input" id="board-name-input" type="text" placeholder="画板名称 或 粘贴画板链接..." autocomplete="off" />
        <div class="modal-actions">
          <button class="btn-cancel" id="push-modal-cancel">取消</button>
          <button class="btn-confirm" id="push-modal-confirm">下一步</button>
        </div>
      </div>

      <!-- 第二步：等待用户手动 Save 一次 -->
      <div id="push-step-wait" style="display:none">
        <h3>识别画板 ID</h3>
        <p>请在 Pinterest 上手动将<strong>任意一张</strong> Pin 保存到</p>
        <div class="push-wait-board-name" id="push-wait-board-name"></div>
        <p class="push-wait-hint">扩展检测到后将自动开始批量推送</p>
        <div class="push-spinner"></div>
        <div class="modal-actions">
          <button class="btn-cancel" id="push-wait-cancel">取消</button>
        </div>
      </div>

    </div>
  </div>

  <!-- 推送进度覆盖层 -->
  <div class="push-progress-overlay" id="push-progress-overlay">
    <div class="push-progress-box">
      <div class="push-progress-title">正在推送到画板</div>
      <div class="push-progress-board" id="push-progress-board"></div>
      <div class="push-progress-bar-wrap">
        <div class="push-progress-bar" id="push-progress-bar"></div>
      </div>
      <div class="push-progress-text" id="push-progress-text">0 / 0</div>
      <button class="btn-cancel push-stop-btn" id="push-stop-btn">停止</button>
    </div>
  </div>

  <!-- 确认对话框 -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <h3>清空收藏？</h3>
      <p>将删除全部 <span id="modal-count">0</span> 张图片，无法撤销。</p>
      <div class="modal-actions">
        <button class="btn-cancel" id="modal-cancel">取消</button>
        <button class="btn-confirm" id="modal-confirm">确认清空</button>
      </div>
    </div>
  </div>

  <script type="module" src="js/sidepanel.js"></script>
</body>
</html>
