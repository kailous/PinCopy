name: Deploy Privacy Policy to GitHub Pages

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'PRIVACY.md'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build HTML from PRIVACY.md
        run: |
          mkdir -p _site
          cat > _site/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Privacy Policy - PinCopy</title>
            <style>
              body {
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
                max-width: 800px;
                margin: 40px auto;
                padding: 0 20px;
                color: #333;
                line-height: 1.6;
              }
              h1 { color: #e60023; }
              h2 { color: #555; border-bottom: 1px solid #eee; padding-bottom: 8px; }
              a { color: #e60023; }
            </style>
          </head>
          <body>
          PRIVACY_CONTENT
          </body>
          </html>
          EOF

          # 安装 pandoc 将 Markdown 转为 HTML 片段
          sudo apt-get install -y pandoc
          CONTENT=$(pandoc PRIVACY.md --from markdown --to html)
          # 将内容替换到模板中
          python3 -c "
          import sys
          with open('_site/index.html', 'r') as f:
              html = f.read()
          content = open('/dev/stdin').read()
          html = html.replace('PRIVACY_CONTENT', content)
          with open('_site/index.html', 'w') as f:
              f.write(html)
          " <<< "$CONTENT"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
