name: Build and Release Chrome Extension

on:
  push:
    branches:
      - main
      - master

jobs:
  build-and-release:
    name: Build & Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write # 允许创建 Release

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract Version from manifest.json
        id: extract_version
        run: |
          VERSION=$(jq -r .version manifest.json)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Check if Release exists
        id: check_release
        run: |
          if gh release view "v${{ env.VERSION }}" > /dev/null 2>&1; then
            echo "Release v${{ env.VERSION }} already exists. Skipping."
            echo "skip=true" >> $GITHUB_ENV
          else
            echo "skip=false" >> $GITHUB_ENV
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Extension Archive
        if: env.skip == 'false'
        run: |
          mkdir build
          # 拷贝扩展文件到 build 目录，排除不必要的文件
          rsync -r --exclude='.git' \
                   --exclude='.github' \
                   --exclude='*.md' \
                   --exclude='*.gif' \
                   --exclude='*.mp4' \
                   --exclude='.DS_Store' \
                   --exclude='build' \
                   . build/
          cd build
          zip -r ../PinCopy-v${{ env.VERSION }}.zip .

      - name: Create GitHub Release
        if: env.skip == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: Release v${{ env.VERSION }}
          files: PinCopy-v${{ env.VERSION }}.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
